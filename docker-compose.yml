version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wendrink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wendrink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wendrink_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wendrink_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wendrink} -d ${POSTGRES_DB:-wendrink_erp}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
