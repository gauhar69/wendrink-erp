version: '3.8'

services:
  n8n:
    build: .
    image: wendrink-erp:latest
    container_name: wendrink_app
    restart: always
    ports:
      - "5678:5678"
    volumes:
      # База данных хранится на сервере — не теряется при обновлениях
      - ./wendrink.db:/app/wendrink.db
    environment:
      - APP_ENV=production

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: wendrink_tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TOKEN}
  bot:
    build:
      context: ./bot
    container_name: wendrink_bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - n8n

volumes: {}
