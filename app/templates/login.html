<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WENDRINK ERP — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0f14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.06) 0%, transparent 50%);
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    input:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(255,255,255,0.08);
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">☕</div>
      <h1>WENDRINK ERP</h1>
      <p>Система управления кофейней</p>
    </div>

    <form method="POST" action="/auth/login" id="login-form">
      <div class="form-group">
        <label for="login">Логин</label>
        <input
          id="login"
          type="text"
          name="login"
          placeholder="arman"
          autocomplete="username"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button class="btn" type="submit">Войти →</button>
    </form>
  </div>

  <script>
    // Intercept form submit to handle 401 response
    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const resp = await fetch('/auth/login', { method: 'POST', body: data });
      if (resp.ok) {
        window.location.href = '/dashboard';
      } else {
        const err = await resp.json().catch(() => ({}));
        const msg = err.detail || 'Неверный логин или пароль';
        document.querySelectorAll('.error').forEach(el => el.remove());
        const div = document.createElement('div');
        div.className = 'error';
        div.textContent = msg;
        form.before(div);
      }
    });
  </script>
</body>
</html>
